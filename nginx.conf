server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types text/css text/plain text/xml application/javascript application/json application/xml image/svg+xml image/x-icon;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Liveness — nginx-only, returns 200 as long as the server is running.
    # Used by Sevalla's liveness probe — failing this restarts the container.
    location = /live {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Legacy alias (kept for backwards compat with any pre-existing probes)
    location = /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Readiness — proxies to Node, which verifies DB is reachable.
    # Used by Sevalla's readiness probe — failing this removes the pod
    # from the load balancer but does NOT restart the container.
    location = /ready {
        proxy_pass http://127.0.0.1:3000/ready;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
        access_log off;
    }

    # Root → index.html
    location = / {
        try_files /index.html =404;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Proxy form submissions to Node
    location = /api/lead {
        proxy_pass http://127.0.0.1:3000/lead;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SendGrid event webhook
    location = /api/sendgrid-events {
        proxy_pass http://127.0.0.1:3000/sendgrid-events;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Leads dashboard (Microsoft SSO protected at the app level)
    location = /dashboard {
        proxy_pass http://127.0.0.1:3000/dashboard;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Microsoft SSO endpoints (login, OAuth callback, logout)
    location /auth/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Images & fonts — safe to cache aggressively (content rarely changes)
    location ~* \.(png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # CSS/JS — short TTL, must-revalidate. Without versioned filenames we
    # can't safely mark these immutable; otherwise CDN + browser pin stale
    # assets across deploys. Use ?v=... query string in HTML links for
    # cache busting on each change.
    location ~* \.(css|js)$ {
        expires 5m;
        add_header Cache-Control "public, max-age=300, must-revalidate";
    }
}
