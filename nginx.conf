server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types text/css text/plain text/xml application/javascript application/json application/xml image/svg+xml image/x-icon;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Liveness — nginx-only, 200 as long as the server is running.
    # Used by Sevalla's liveness probe — failing this restarts the container.
    # `always` on Cache-Control ensures no intermediate cache can pin a stale
    # 200 across an outage. Security headers repeated because any per-location
    # add_header kills server-level add_header inheritance.
    location = /health {
        access_log off;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Type text/plain always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        return 200 'ok';
    }

    # Readiness — proxies to Node, which verifies DB is reachable.
    # Used by:
    #   - Sevalla readiness probe (failure removes pod from LB, no restart)
    #   - Pingdom external uptime monitoring (end-to-end: DNS + TLS + nginx + Node + DB)
    # `always` attaches Cache-Control to BOTH 200 and 503 so monitors can't
    # see a cached ready state when the app is actually down. proxy_hide_header
    # drops the upstream Cache-Control to avoid duplicates.
    location = /ready {
        access_log off;
        proxy_pass http://127.0.0.1:3000/ready;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
        proxy_hide_header Cache-Control;
        proxy_hide_header Content-Type;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Type text/plain always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }

    # Root → index.html
    location = / {
        try_files /index.html =404;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Proxy form submissions to Node
    location = /api/lead {
        proxy_pass http://127.0.0.1:3000/lead;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SendGrid event webhook
    location = /api/sendgrid-events {
        proxy_pass http://127.0.0.1:3000/sendgrid-events;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Images & fonts — safe to cache aggressively (content rarely changes)
    location ~* \.(png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # CSS/JS — short TTL, must-revalidate. Without versioned filenames we
    # can't safely mark these immutable; otherwise CDN + browser pin stale
    # assets across deploys. Use ?v=... query string in HTML links for
    # cache busting on each change.
    location ~* \.(css|js)$ {
        expires 5m;
        add_header Cache-Control "public, max-age=300, must-revalidate";
    }
}
