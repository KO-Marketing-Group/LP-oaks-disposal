server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types text/css text/plain text/xml application/javascript application/json application/xml image/svg+xml image/x-icon;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Health check
    location = /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Root → index.html
    location = / {
        try_files /index.html =404;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Proxy form submissions to Node
    location = /api/lead {
        proxy_pass http://127.0.0.1:3000/lead;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SendGrid event webhook
    location = /api/sendgrid-events {
        proxy_pass http://127.0.0.1:3000/sendgrid-events;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets (images, css, js) — long cache
    location ~* \.(png|jpg|jpeg|gif|svg|ico|webp|css|js|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
